<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WonderTrail — Meus Favoritos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark wt-navbar sticky-top">
    <div class="container">
      <a class="navbar-brand wt-brand" href="index.html">
        <i class="bi bi-compass me-2"></i>WonderTrail
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarMain">
        <ul class="navbar-nav ms-auto mb-2 mb-lg-0 align-items-lg-center gap-lg-2">
          <li class="nav-item"><a class="nav-link" href="index.html"><i class="bi bi-house me-1"></i>Início</a></li>
          <li class="nav-item" id="nav-cadastro-itens" style="display:none">
            <a class="nav-link" href="cadastro_itens.html"><i class="bi bi-plus-circle me-1"></i>Cadastro</a>
          </li>
          <li class="nav-item" id="nav-fav-item" style="display:none">
            <a class="nav-link active" href="favoritos.html"><i class="bi bi-heart-fill me-1"></i>Favoritos</a>
          </li>
          <li class="nav-item" id="nav-login-item">
            <a class="nav-link" href="index.html"><i class="bi bi-person me-1"></i>Login</a>
          </li>
          <li class="nav-item" id="nav-logout-item" style="display:none">
            <a class="nav-link btn-logout" href="#" style="cursor:pointer">
              <i class="bi bi-box-arrow-right me-1"></i>Logout (<span></span>)
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="py-5">
    <div class="container">
      <div class="wt-section-header mb-5">
        <span class="wt-tag">Minha coleção</span>
        <h2 class="wt-section-title">Itens Favoritos</h2>
        <p class="wt-section-sub">Seus destinos salvos para planejar a próxima aventura.</p>
      </div>
      <div id="favoritos-container" class="row g-4"></div>
    </div>
  </section>

  <footer class="wt-footer py-4">
    <div class="container">
      <div class="row align-items-center gy-3">
        <div class="col-md-4 text-center text-md-start">
          <a class="wt-brand wt-footer-brand" href="index.html"><i class="bi bi-compass me-2"></i>WonderTrail</a>
        </div>
        <div class="col-md-4 text-center">
          <small class="text-muted">© 2025 WonderTrail · Trabalho Prático 2</small>
        </div>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/scripts/login.js"></script>
  <script src="assets/scripts/app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.getElementById('favoritos-container');
      const u = getUsuarioLogado();

      if (!u) {
        container.innerHTML = `
          <div class="col-12 wt-empty-fav">
            <i class="bi bi-lock"></i>
            <h4>Faça login para ver seus favoritos</h4>
            <a href="index.html" class="btn wt-btn-card mt-3"><i class="bi bi-arrow-left me-2"></i>Ir para o início</a>
          </div>`;
        return;
      }

      const favRes = await fetch(`${API}/favoritos?usuarioId=${u.id}`);
      const favs = await favRes.json();

      if (favs.length === 0) {
        container.innerHTML = `
          <div class="col-12 wt-empty-fav">
            <i class="bi bi-heart"></i>
            <h4>Você ainda não tem favoritos</h4>
            <p>Explore destinos e clique no coração para salvar!</p>
            <a href="index.html#destinos" class="btn wt-btn-card mt-2"><i class="bi bi-compass me-2"></i>Explorar destinos</a>
          </div>`;
        return;
      }

      // Load each lugar
      const lugares = await Promise.all(favs.map(f => fetch(`${API}/lugares/${f.lugarId}`).then(r => r.json())));

      container.innerHTML = lugares.map(lugar => `
        <div class="col-sm-6 col-lg-4" id="fav-card-${lugar.id}">
          <div class="wt-card h-100">
            <div class="wt-card-img-wrapper">
              <img src="${lugar.imagem_pincipal}" alt="${lugar.nome}" class="wt-card-img" loading="lazy">
              ${lugar.destaque ? `<span class="wt-card-badge"><i class="bi bi-star-fill me-1"></i>Destaque</span>` : ''}
              <button class="wt-fav-btn" onclick="removerFavoritoPage(${lugar.id})" title="Remover favorito">
                <i class="bi bi-heart-fill"></i>
              </button>
            </div>
            <div class="wt-card-body">
              <div class="d-flex justify-content-between align-items-start mb-2">
                <h3 class="wt-card-nome">${lugar.nome}</h3>
                <span class="wt-card-pais"><i class="bi bi-geo-alt-fill me-1"></i>${lugar.pais}</span>
              </div>
              <p class="wt-card-desc">${lugar.descricao}</p>
              <div class="mt-auto pt-3">
                <a href="detalhes.html?id=${lugar.id}" class="btn wt-btn-card w-100 mt-2">Ver Detalhes <i class="bi bi-arrow-right ms-1"></i></a>
              </div>
            </div>
          </div>
        </div>`).join('');
    });

    async function removerFavoritoPage(lugarId) {
      const u = getUsuarioLogado();
      const res = await fetch(`${API}/favoritos?usuarioId=${u.id}&lugarId=${lugarId}`);
      const favs = await res.json();
      if (favs.length > 0) {
        await fetch(`${API}/favoritos/${favs[0].id}`, { method: 'DELETE' });
        const card = document.getElementById(`fav-card-${lugarId}`);
        if (card) card.remove();
        mostrarToast('Removido dos favoritos', 'secondary');
        const container = document.getElementById('favoritos-container');
        if (container && container.children.length === 0) {
          container.innerHTML = `<div class="col-12 wt-empty-fav"><i class="bi bi-heart"></i><h4>Você não tem mais favoritos</h4><a href="index.html#destinos" class="btn wt-btn-card mt-2">Explorar destinos</a></div>`;
        }
      }
    }
  </script>
</body>
</html>
